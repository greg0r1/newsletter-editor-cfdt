<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACTU UD CFDT 06 — Éditeur de newsletter</title>
  <link rel="stylesheet" href="/src/styles/boot.css" />
</head>

<body>

  <div id="bootLoader">Chargement de la newsletter…</div>

  <div id="appContent" class="loading">

    <header class="toolbar no-print">
      <div class="brand">
        <span class="brand-logo">
          <img src="/cfdt-logo.svg" alt="CFDT" />
        </span>
        <span class="brand-txt">
          <h1>ACTU UD CFDT 06</h1>
          <span class="brand-sub">Éditeur de newsletter</span>
        </span>
      </div>

      <span class="save-indicator" id="saveIndicator"></span>

      <nav class="toolbar-actions" aria-label="Actions">
        <button class="tbtn primary" id="btnAdd" title="Ajouter un article">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span class="lbl">Article</span>
        </button>
        <span class="tsep" aria-hidden="true"></span>

        <div class="tmenu">
          <button class="tbtn" id="btnExportMenu" title="Exporter la newsletter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="m7 10 5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
            <span class="lbl">Exporter</span>
            <svg class="tmenu-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
          <div class="tmenu-pop" id="exportMenu" hidden>
            <button type="button" class="tmenu-item" id="btnExport" title="Exporter en JSON">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <path d="M14 2v6h6" />
              </svg>
              <span>Export JSON</span>
            </button>
            <button type="button" class="tmenu-item" id="btnExportEmail" title="Aperçu et export HTML email">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M4 4h16v16H4z" />
                <path d="m4 6 8 7 8-7" />
              </svg>
              <span>Export email</span>
            </button>
            <button type="button" class="tmenu-item" id="btnPrint" title="Imprimer ou enregistrer en PDF">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M6 9V2h12v7" />
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                <rect x="6" y="14" width="12" height="8" />
              </svg>
              <span>Imprimer / PDF</span>
            </button>
          </div>
        </div>

        <div class="tmenu">
          <button class="tbtn" id="btnMoreMenu" title="Plus d'actions">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="5" cy="12" r="1" />
              <circle cx="12" cy="12" r="1" />
              <circle cx="19" cy="12" r="1" />
            </svg>
            <span class="lbl">Plus</span>
          </button>
          <div class="tmenu-pop" id="moreMenu" hidden>
            <button type="button" class="tmenu-item" id="btnImportTrigger" title="Importer un fichier JSON">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <path d="m17 8-5-5-5 5" />
                <path d="M12 3v12" />
              </svg>
              <span>Importer</span>
            </button>
            <button type="button" class="tmenu-item danger" id="btnReset" title="Réinitialiser le contenu">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
              </svg>
              <span>Réinitialiser</span>
            </button>
            <button type="button" class="tmenu-item" id="btnLogout" title="Se déconnecter">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <path d="m16 17 5-5-5-5" />
                <path d="M21 12H9" />
              </svg>
              <span>Se déconnecter</span>
            </button>
          </div>
        </div>
      </nav>
    </header>

    <div class="app-body">
      <div class="wrap-outer">
        <div class="newsletter" id="newsletterRoot"></div>
      </div>
      <div class="pf-scrim no-print" id="panelScrim"></div>
      <div class="pf-resize-handle no-print" id="panelResizeHandle" title="Redimensionner"></div>
      <aside class="edit-panel no-print" id="editPanel"></aside>
    </div>

    <input type="file" id="importInput" accept="application/json,.json" style="display:none" />

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
