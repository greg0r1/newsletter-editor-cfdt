<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACTU UD CFDT 06 — Éditeur de newsletter</title>
<style>
  /* Masque le contenu (pas le body entier) tant que le CSS/JS ne sont pas prêts,
     pour éviter le flash de contenu non stylé. Le loader reste visible pendant ce
     temps, donc la page n'est jamais silencieusement vide si le chargement traîne
     ou échoue — voir src/main.ts. */
  #appContent.loading { visibility: hidden; }
  #bootLoader {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Trebuchet MS", "Segoe UI", Verdana, Helvetica, Arial, sans-serif;
    background: #fdf3e9;
    color: #0b2c54;
    font-size: 15px;
  }
  #bootLoader.hidden { display: none; }
</style>
</head>
<body>

<div id="bootLoader">Chargement…</div>

<div id="appContent" class="loading">

<div class="toolbar no-print">
  <h1>📰 Éditeur ACTU UD CFDT 06</h1>
  <span class="save-indicator" id="saveIndicator"></span>
  <button class="tbtn primary" id="btnAdd">＋ Article</button>
  <button class="tbtn" id="btnImportTrigger">⬆ Importer</button>
  <button class="tbtn" id="btnExport">⬇ Exporter</button>
  <button class="tbtn" id="btnPrint">🖨 Imprimer / PDF</button>
  <button class="tbtn danger" id="btnReset">↺ Réinitialiser</button>
  <button class="tbtn" id="btnLogout">⎋ Se déconnecter</button>
</div>

<div class="wrap-outer">
  <div class="newsletter" id="newsletterRoot"></div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" />
<input type="file" id="importInput" accept="application/json,.json" style="display:none" />

<div class="fmt-toolbar no-print" id="fmtToolbar">
  <button data-cmd="bold" title="Gras"><b>G</b></button>
  <button data-cmd="insertUnorderedList" title="Liste à puces">• Liste</button>
</div>

</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
