<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACTU UD CFDT 06 — Éditeur de newsletter</title>
<style>
:root{
  --orange:#E84E10; --navy:#0B2C54;
  --cream:#FDF3E9; --peach:#FDEDE2; --lav:#F3F0F6;
  --ink:#2f3640; --muted:#4a5666; --line:#e7ded3;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
body{
  font-family:"Trebuchet MS","Segoe UI",Verdana,Helvetica,Arial,sans-serif;
  color:var(--ink); background:#e9edf1; line-height:1.34;
}

/* ---------- TOOLBAR ---------- */
.toolbar{position:sticky;top:0;z-index:50;background:#0B2C54;color:#fff;
  display:flex;align-items:center;gap:8px;padding:10px 16px;flex-wrap:wrap;
  box-shadow:0 2px 10px rgba(0,0,0,.15);}
.toolbar h1{font-size:14px;font-weight:700;margin-right:auto;letter-spacing:.2px;opacity:.9;}
.tbtn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
  border-radius:7px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:background .15s;}
.tbtn:hover{background:rgba(255,255,255,.24);}
.tbtn.primary{background:var(--orange);border-color:var(--orange);}
.tbtn.primary:hover{background:#ff5c1e;}
.tbtn.danger:hover{background:#c0392b;border-color:#c0392b;}
.save-indicator{font-size:11.5px;opacity:.75;min-width:90px;}
.wrap-outer{padding:24px 12px 60px;}

/* ---------- NEWSLETTER SHEET ---------- */
.newsletter{width:210mm;max-width:100%;margin:0 auto;background:#fff;
  box-shadow:0 12px 40px rgba(11,44,84,.18);position:relative;}
.articles{column-count:3;column-gap:16px;column-fill:auto;padding:0 10mm;}

/* ---------- EDITABLE AFFORDANCES ---------- */
.editable{outline:2px dashed transparent;outline-offset:2px;border-radius:5px;cursor:text;transition:outline-color .12s,background .12s;}
.editable:hover{outline-color:#c9d3dd;}
.editable:focus{outline-color:var(--orange);outline-style:solid;background:rgba(232,78,16,.05);}
.img-wrap{position:relative;}
.img-btn{position:absolute;bottom:6px;right:6px;background:rgba(11,44,84,.85);color:#fff;
  border:none;border-radius:6px;padding:5px 9px;font-size:10.5px;font-weight:600;cursor:pointer;
  opacity:0;pointer-events:none;transition:opacity .15s;display:flex;align-items:center;gap:4px;}
.img-wrap:hover .img-btn{opacity:1;pointer-events:auto;}
.img-btn:hover{background:var(--orange);}
.no-img-placeholder{background:#eef1f4;border:1.5px dashed #c7d0da;border-radius:8px;
  height:70px;display:flex;align-items:center;justify-content:center;color:#8a97a5;font-size:11px;
  margin-bottom:6px;cursor:pointer;gap:6px;}
.no-img-placeholder:hover{background:#e5e9ee;}

.art-toolbar{display:flex;justify-content:flex-end;gap:3px;margin-bottom:4px;}
.mini-btn{height:20px;border:none;background:#eef1f4;border-radius:5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#8a97a5;font-size:10.5px;
  padding:0 7px;font-weight:600;white-space:nowrap;}
.mini-btn:hover{background:#dfe6ed;color:var(--navy);}
.mini-btn.del:hover{background:#fdeaea;color:#c0392b;}

.add-art-btn{break-inside:avoid;border:2px dashed #c7d0da;border-radius:10px;
  color:#8a97a5;font-size:12.5px;font-weight:600;padding:16px;text-align:center;cursor:pointer;
  margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px;background:#fafbfc;}
.add-art-btn:hover{background:#eef3f8;color:var(--navy);border-color:#a9b8c7;}

.fmt-toolbar{position:fixed;z-index:100;background:#0B2C54;border-radius:8px;padding:4px;
  display:none;gap:2px;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.fmt-toolbar button{background:transparent;border:none;color:#fff;padding:6px 9px;border-radius:5px;
  cursor:pointer;font-size:12px;font-weight:700;}
.fmt-toolbar button:hover{background:rgba(255,255,255,.18);}

/* ---------- MASTHEAD ---------- */
.mast{position:relative;display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:10px;padding:7mm 10mm 4mm;overflow:hidden;}
.mast::before{content:"";position:absolute;top:-72px;left:-72px;width:150px;height:150px;
  border-radius:40px;background:var(--orange);transform:rotate(8deg);opacity:.12;}
.mast-left{display:flex;align-items:center;gap:11px;position:relative;z-index:2;}
.cfdt-logo{background:var(--orange);color:#fff;border-radius:13px;padding:6px 11px 8px;
  line-height:.9;display:inline-flex;align-items:flex-end;font-weight:800;letter-spacing:.5px;
  box-shadow:0 3px 8px rgba(232,78,16,.35);flex:0 0 auto;}
.cfdt-logo span{font-size:23px;} .cfdt-logo b{font-size:23px;margin-left:1px;}
.mast-org{font-size:10.5px;font-weight:800;color:var(--navy);line-height:1.14;
  letter-spacing:.3px;text-transform:uppercase;min-width:90px;}
.mast-center{text-align:center;position:relative;z-index:2;}
.mast-title{font-size:35px;font-weight:800;letter-spacing:1px;line-height:1;color:var(--navy);}
.mast-title .o{color:var(--orange);}
.mast-title span.editable,.mast-title strong.editable{display:inline-block;min-width:10px;}
.mast-pill{display:inline-block;margin-top:6px;background:var(--navy);color:#fff;
  font-size:12.5px;font-weight:700;font-style:italic;letter-spacing:.4px;padding:4px 18px;border-radius:20px;min-width:40px;}
.mast-right{width:132px;position:relative;z-index:2;}
.mast-right img{width:132px;height:auto;display:block;margin-left:auto;border-radius:6px;}

/* ---------- EDITO ---------- */
.edito{background:var(--peach);border-radius:13px;margin:0 10mm 3mm;padding:9px 18px;
  display:grid;grid-template-columns:104px 1fr;gap:12px;align-items:center;break-inside:avoid;position:relative;}
.edito-sun img{width:98px;height:auto;display:block;}
.edito-txt p{margin-bottom:4px;font-size:11.3px;color:var(--muted);line-height:1.32;}
.edito-txt .hello{font-weight:800;color:var(--orange);font-size:13.5px;margin-bottom:6px;display:block;}
.edito-txt .sign{font-weight:800;color:var(--orange);font-size:14px;font-style:italic;margin-top:1px;display:block;}
.edito-body p:last-child{margin-bottom:0;}

/* ---------- ARTICLES ---------- */
.art{break-inside:avoid;margin:0 0 11px;position:relative;padding-top:2px;}
.art-head{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;}
.num{flex:0 0 auto;width:23px;height:23px;border-radius:50%;background:var(--orange);color:#fff;
  font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 4px rgba(232,78,16,.4);}
.art-head h3{color:var(--navy);font-size:14px;font-weight:800;line-height:1.1;padding-top:1px;flex:1;}
.art-img{width:100%;height:auto;border-radius:8px;display:block;margin-bottom:5px;}
.art-body p{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.36;}
.art-body p:last-child{margin-bottom:0;}
.art-body ul{margin:4px 0 6px 16px;}
.art-body li{font-size:11.5px;color:var(--navy);font-weight:700;margin-bottom:4px;}
.art-highlight{background:var(--orange);color:#fff;border-radius:9px;padding:7px 11px;margin-top:6px;
  font-size:11px;font-weight:700;line-height:1.28;}

/* ---------- BOTTOM (info + summer) + FOOTER = tail, always last ---------- */
.tail{break-inside:avoid;}
.bottom{display:grid;grid-template-columns:1fr 2fr;gap:15px;padding:6px 10mm 4mm;break-inside:avoid;}
.box{border-radius:13px;padding:12px 15px;position:relative;}
.box-info{background:var(--lav);} .box-summer{background:var(--cream);}
.box-head{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.box-head .bh-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;flex:0 0 auto;color:#fff;background:var(--navy);}
.box-info h4{color:var(--navy);font-size:13px;font-weight:800;}
.box p{font-size:11.5px;color:var(--muted);margin-bottom:6px;line-height:1.42;} .box p:last-child{margin-bottom:0;}
.box-summer .sun-mini{width:34px;height:34px;flex:0 0 auto;border-radius:50%;}
.box-summer h4{color:var(--orange);font-size:18px;font-weight:800;font-style:italic;}
.box-summer .sign{color:var(--orange);font-weight:800;font-style:italic;font-size:13px;margin-top:2px;display:block;}

/* ---------- FOOTER (fixed, never editable) ---------- */
.foot{background:var(--orange);color:#fff;display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:14px;padding:10px 10mm;break-inside:avoid;}
.foot-l,.foot-r{display:flex;align-items:center;gap:11px;font-weight:800;font-size:13.5px;
  line-height:1.1;letter-spacing:.3px;}
.foot-r{justify-content:flex-end;text-align:right;}
.foot svg{flex:0 0 auto;}
.foot-logo{background:#fff;color:var(--orange);border-radius:50%;width:50px;height:50px;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-weight:800;font-size:17px;line-height:.9;}

@page{size:A4;margin:0;}
@media print{
  body{background:#fff;}
  .toolbar,.no-print{display:none!important;}
  .wrap-outer{padding:0;}
  .newsletter{width:100%;box-shadow:none;}
  .editable{outline:none!important;background:none!important;}
  .art-toolbar,.img-btn,.add-art-btn,.fmt-toolbar{display:none!important;}
}
@media(max-width:760px){
  .articles{column-count:1;}
  .mast{grid-template-columns:1fr;text-align:center;gap:12px;}
  .mast-left{justify-content:center;} .mast-right{margin:0 auto;}
  .edito{grid-template-columns:1fr;text-align:center;} .edito-sun img{margin:0 auto;}
  .bottom{grid-template-columns:1fr;}
  .foot{grid-template-columns:1fr;text-align:center;gap:14px;} .foot-r{justify-content:center;text-align:center;}
}

</style>
</head>

des travailleurs saisonniers de Valberg, ainsi que les prochains rendez-vous de l'UD.</p><p>Comme toujours, notre Union départementale reste pleinement mobilisée aux côtés des syndicats, des sections syndicales, des élus, des mandatés et de l'ensemble des militants qui font vivre la CFDT chaque jour dans les Alpes-Maritimes.</p><p>Je vous souhaite une bonne lecture et, pour celles et ceux qui partiront prochainement, un très bel été.</p>", "signature": "Flore", "image": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAcFBQYFBAcGBgYIBwcICxILCwoKCxYPEA0SGhYbGhkWGRgcICgiHB4mHhgZIzAkJiorLS4tGyIyNTEsNSgsLSz/2wBDAQcICAsJCxULCxUsHRkdLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCz/wAARCAB4AG4DASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD6IpHcoMhGb6dqcSAOTikMkf8AfXP+8K5pSW17Gox1jnhw6hkI5DCuT1K9W7lO35LOA7UReMn/AD+Qrf1y5NvpMhU8vhAR7/8A1s1xztmNEHQDJ+p/z+lfF8RYxRaox7Xfn2R6uBpX99jSQSSBgelFFFfCtntC5pQdoznGKSihNp3Dc67Q9SN7bGOVszRjr/eHY1ZjtszCSWVpXHTPCr+FcpoVwYdTiGeC2w/Q1p6jq99DfSQQRbAhwDsLE+9foOBzSnLCRnibtxdtPwPDrYVqq4w66nSdaOtc3bXGvXEi7d4XPJdQFxXSdhX0ODxixabUWrd0cNWl7J2bT9ApR1pKBXeZFHUNO+3hP3zRlc8YyDWVL4dmzxcR49Spro8VBPI6NtSB5CRnIOB+dePjMtwtZurVTv5X/Q6KVepD3YswdSsXstAWJpDIRKGJ7Dg8CsCu51C1a70uWPb8xXIHXkVwjPtlCngH9DXxnEOF9hWhyfDbT5Hr4Cpzxd97jsUUtGK+YPQEFHajHNNdwq56k9B60LUETaXltUj2/wDPVa9Bx1rjfDNkZL4SkZEQ3E+pPSuskt0lYOSwcDGVYiv0XhulOGHlO27PDzGSlVS7ElL2pBwKK+tR5gpoFFLQAlIzKqlmICgZJPalNYWpxX+o3jWkSFLdMZY8K  les nombreux services qui accueillent les vacanciers. Autant de secteurs qui recrutent chaque année de nombreux salariés saisonniers.</p><p>Ces travailleurs occupent souvent des emplois précaires, avec des contrats de courte durée, des horaires parfois importants et des difficultés de logement. Beaucoup connaissent également mal leurs droits.</p><p>Être présents sur le terrain est essentiel pour la CFDT. C'est l'occasion d'informer les saisonniers, de répondre à leurs questions, de les accompagner si nécessaire et de leur rappeler qu'ils ne sont pas seuls.</p><p>Aller à leur rencontre, c'est aussi défendre celles et ceux qui font vivre l'économie touristique de notre département tout au long de l'été.</p>", "highlight": "cf la communication spécifique pour les inscriptions."}, {"id": "a5", "title": "La CFDT à la Pink Parade", "image": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAcFBQYFBAcGBgYIBwcICxILCwoKCxYPEA0SGhYbGhkWGRgcICgiHB4mHhgZIzAkJiorLS4tGyIyNTEsNSgsLSz/2wBDAQcICAsJCxULCxUsHRkdLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCwsLCz/wAARCAERAQ4DASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwDqPHHgy40a8lvbKFnsJDvGwZ8k+hx29DVK0+IviKGyFsLqF8DaJHjzJj65x+le4s0TAgspB7Gsp9A0NpfNk02yL9c+UteJPLZRm5UJctz6Olm0JU1DFU+a2zPGdF8N6l4t1fcPM8pn3T3T9B68929q92sLOHT7CG0t12RQoEUDsBTolgihCRCONF6KuABThLH03j867MHgo4VPW7fU4cwzCpjWla0VsiTHBpApHegSJ/fH50eYn98fnXeeVYTbSbOfrS+bH/fX86BJH/fH50BZihcCgjtQZYx/GPzpBLH/ /* ================= TEMPLATES ================= */
function articleHTML(a){
  var imgBlock;
  if(a.image){
    imgBlock = '<div class="img-wrap"><img class="art-img" src="'+a.image+'">' +
      '<button class="mini-btn img-btn no-print" data-action="changeImage" title="Changer l\'image">\uD83D\uDDBC Changer</button></div>';
  } else {
    imgBlock = '<div class="no-img-placeholder no-print" data-action="changeImage">\uD83D\uDDBC Ajouter une image</div>';
  }
  var hl = '';
  if(a.highlight != null){
    hl = '<div class="art-highlight editable" contenteditable="true" data-field="highlight">'+a.highlight+'</div>';
  }
  return '' +
  '<article class="art" data-id="'+a.id+'">' +
    '<div class="art-toolbar no-print">' +
      '<button class="mini-btn" data-action="moveUp" title="Monter">\u2191</button>' +
      '<button class="mini-btn" data-action="moveDown" title="Descendre">\u2193</button>' +
      '<button class="mini-btn" data-action="toggleHighlight" title="Encart mis en avant">'+(a.highlight!=null?'\u2212 encart':'+ encart')+'</button>' +
      '<button class="mini-btn del" data-action="deleteArticle" title="Supprimer">\uD83D\uDDD1</button>' +
    '</div>' +
    '<div class="art-head"><span class="num"></span><h3 class="editable" contenteditable="true" data-field="title">'+a.title+'</h3></div>' +
    imgBlock +
    '<div class="art-body editable" contenteditable="true" data-field="body">'+a.body+'</div>' +
    hl +
  '</article>';
}

/* ================= RENDER / RENUMBER ================= */
function renderAll(state){
  document.getElementById('newsletterRoot').innerHTML = fullHTML(state);
  renumber();
}
function renumber(){
  var nums = document.querySelectorAll('#articlesContainer .art .num');
  for(var i=0;i<nums.length;i++){ nums[i].textContent = (i+1); }
}

/* ================= SERIALIZE ================= */
function txt(sel){ var e=document.querySelector(sel); return e ? e.textContent.trim() : ''; }
function html(sel){ var e=document.querySelector(sel); return e ? e.innerHTML.trim() : ''; }

function serialize(){
  var articles = [];
  var artEls = document.querySelectorAll('#articlesContainer .art');
  for(var i=0;i<artEls.length;i++){
    var artEl = artEls[i];
    var img = artEl.querySelector('.art-img');
    var hl = artEl.querySelector('.art-highlight');
    articles.push({
      id: artEl.getAttribute('data-id'),
      title: html('#articlesContainer .art:nth-of-type('+(i+1)+') [data-field="title"]') || artEl.querySelector('[data-field="title"]').innerHTML,
      image: img ? img.getAttribute('src') : null,
      body: artEl.querySelector('[data-field="body"]').innerHTML,
      highlight: hl ? hl.innerHTML : null
    });
  }
  var mastImg = document.querySelector('.mast-right img');
  var editoImg = document.querySelector('.edito-sun img');
  var summerImg = document.querySelector('.box-summer .sun-mini');
  return {
    mast: {
      orgLines: html('[data-field="mastOrg"]'),
      titleAccent: txt('[data-field="titleAccent"]'),
      titleRest: txt('[data-field="titleRest"]'),
      period: txt('[data-field="period"]'),
      image: mastImg ? mastImg.getAttribute('src') : DEFAULT_STATE.mast.image
    },
    edito: {
      hello: txt('[data-field="editoHello"]'),
      body: html('[data-field="editoBody"]'),
      signature: txt('[data-field="editoSign"]'),
      image: editoImg ? editoImg.getAttribute('src') : DEFAULT_STATE.edito.image
    },
    articles: articles,
    infoBox: {
      title: txt('[data-field="infoTitle"]'),
      body: html('[data-field="infoBody"]')
    },
    summerBox: {
      title: txt('[data-field="summerTitle"]'),
      body: html('[data-field="summerBody"]'),
      signature: txt('[data-field="summerSign"]'),
      image: summerImg ? summerImg.getAttribute('src') : DEFAULT_STATE.summerBox.image
    }
  };
}

/* ================= STORAGE ================= */
function setSaveIndicator(t){
  var el = document.getElementById('saveIndicator');
  if(el) el.textContent = t;
}
async function loadState(){
  try{
    var res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){ /* no stored data yet */ }
  return DEFAULT_STATE;
}
function scheduleSave(){
  setSaveIndicator('Sauvegarde…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async function(){
    try{
      var data = serialize();
      await window.storage.set(STORAGE_KEY, JSON.stringify(data), false);
      setSaveIndicator('Enregistré \u2713');
    }catch(e){
      setSaveIndicator('Erreur de sauvegarde');
      console.error(e);
    }
  }, 700);
}

/* ================= ARTICLE ACTIONS ================= */
function moveArticle(artEl, dir){
  var parent = artEl.parentElement;
  if(dir === 'up'){
    var prev = artEl.previousElementSibling;
    if(prev && prev.classList.contains('art')) parent.insertBefore(artEl, prev);
  } else {
    var next = artEl.nextElementSibling;
    if(next && next.classList.contains('art')) parent.insertBefore(next, artEl);
  }
  renumber();
  scheduleSave();
}
function deleteArticle(artEl){
  if(!confirm('Supprimer cet article ?')) return;
  artEl.remove();
  renumber();
  scheduleSave();
}
function toggleHighlight(artEl, btn){
  var hl = artEl.querySelector('.art-highlight');
  if(hl){
    hl.remove();
    btn.textContent = '+ encart';
  } else {
    hl = document.createElement('div');
    hl.className = 'art-highlight editable';
    hl.setAttribute('contenteditable','true');
    hl.setAttribute('data-field','highlight');
    hl.textContent = 'Texte mis en avant…';
    artEl.appendChild(hl);
    btn.textContent = '\u2212 encart';
    hl.focus();
    document.execCommand('selectAll', false, null);
  }
  scheduleSave();
}
function addArticle(){
  var id = 'a' + Date.now();
  var data = {id:id, title:'Nouveau titre', image:null, body:'<p>Texte de l\'article…</p>', highlight:null};
  var wrapper = document.createElement('div');
  wrapper.innerHTML = articleHTML(data);
  var node = wrapper.firstElementChild;
  var addBtn = document.querySelector('[data-action="addArticle"]');
  addBtn.parentElement.insertBefore(node, addBtn);
  renumber();
  scheduleSave();
  var titleField = node.querySelector('[data-field="title"]');
  titleField.focus();
  document.execCommand('selectAll', false, null);
}

/* ================= IMAGES ================= */
function requestImage(artEl){
  pendingImageTarget = artEl;
  document.getElementById('fileInput').click();
}
function compressImage(file, maxW, quality){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ================= FORMAT TOOLBAR ================= */
function showFmtToolbar(target){
  var tb = document.getElementById('fmtToolbar');
  var r = target.getBoundingClientRect();
  tb.style.display = 'flex';
  tb.style.top = (window.scrollY + r.top - 38) + 'px';
  tb.style.left = (window.scrollX + r.left) + 'px';
  currentFmtTarget = target;
}
function hideFmtToolbar(){
  document.getElementById('fmtToolbar').style.display = 'none';
}

/* ================= EXPORT / IMPORT / RESET / PRINT ================= */
function exportJSON(){
  var data = serialize();
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = 'newsletter-cfdt-' + stamp + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function resetAll(){
  if(!confirm('Réinitialiser tout le contenu au modèle par défaut ? Cette action est irréversible.')) return;
  renderAll(DEFAULT_STATE);
  scheduleSave();
}
function printNow(){ window.print(); }

/* ================= INIT ================= */
window.addEventListener('DOMContentLoaded', function(){
  try{ document.execCommand('defaultParagraphSeparator', false, 'p'); }catch(e){}

  loadState().then(function(state){
    renderAll(state);
    setSaveIndicator('Chargé');
  });

  document.getElementById('btnAdd').onclick = addArticle;
  document.getElementById('btnPrint').onclick = printNow;
  document.getElementById('btnExport').onclick = exportJSON;
  document.getElementById('btnImportTrigger').onclick = function(){
    document.getElementById('importInput').click();
  };
  document.getElementById('btnReset').onclick = resetAll;

  document.getElementById('importInput').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        renderAll(data);
        scheduleSave();
      }catch(err){
        alert('Fichier invalide : impossible de lire ce fichier JSON.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  document.getElementById('fileInput').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file || !pendingImageTarget) return;
    compressImage(file, 560, 0.82).then(function(dataUrl){
      var wrap = pendingImageTarget.querySelector('.img-wrap');
      if(wrap){
        wrap.querySelector('img').setAttribute('src', dataUrl);
      } else {
        var ph = pendingImageTarget.querySelector('.no-img-placeholder');
        var newWrap = document.createElement('div');
        newWrap.className = 'img-wrap';
        newWrap.innerHTML = '<img class="art-img" src="'+dataUrl+'">' +
          '<button class="mini-btn img-btn no-print" data-action="changeImage" title="Changer l\'image">\uD83D\uDDBC Changer</button>';
        ph.replaceWith(newWrap);
      }
      scheduleSave();
    });
    e.target.value = '';
  });

  document.addEventListener('click', function(e){
    var btn = e.target.closest('[data-action]');
    if(!btn) return;
    var action = btn.getAttribute('data-action');
    var artEl = btn.closest('.art');
    if(action === 'moveUp') moveArticle(artEl, 'up');
    else if(action === 'moveDown') moveArticle(artEl, 'down');
    else if(action === 'deleteArticle') deleteArticle(artEl);
    else if(action === 'toggleHighlight') toggleHighlight(artEl, btn);
    else if(action === 'changeImage') requestImage(artEl);
    else if(action === 'addArticle') addArticle();
  });

  document.getElementById('newsletterRoot').addEventListener('input', function(e){
    if(e.target.classList && e.target.classList.contains('editable')) scheduleSave();
  });

  document.addEventListener('focusin', function(e){
    var f = e.target.getAttribute && e.target.getAttribute('data-field');
    if(f && RICH_FIELDS.indexOf(f) !== -1) showFmtToolbar(e.target);
  });
  document.addEventListener('focusout', function(e){
    setTimeout(function(){
      var ae = document.activeElement;
      if(!ae || !ae.closest || !ae.closest('.editable')) hideFmtToolbar();
    }, 150);
  });
  document.getElementById('fmtToolbar').addEventListener('mousedown', function(e){
    e.preventDefault();
    var btn = e.target.closest('button');
    if(!btn) return;
    document.execCommand(btn.getAttribute('data-cmd'), false, null);
    if(currentFmtTarget) scheduleSave();
  });

  window.addEventListener('beforeprint', hideFmtToolbar);
});

</script>
</body>
</html>
